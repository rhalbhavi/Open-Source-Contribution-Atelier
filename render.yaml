services:
  - type: web
    name: atelier-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd backend && gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atelier-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: atelier-db
    plan: free
    databaseName: atelier_prod
    user: atelier_user

# Native Render Feature: Enables automatic preview environments for Pull Requests!
previewsEnabled: true
