services:
  - type: web
    name: backend
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt && cd backend && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd backend && uvicorn config.asgi:application --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atelier-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: atelier-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
    previewsEnabled: true

  - type: worker
    name: celery-worker
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A config worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atelier-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: atelier-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
    previewsEnabled: true

  - type: redis
    name: atelier-redis
    region: oregon
    plan: free

databases:
  - name: atelier-db
    databaseName: atelier_db
    user: atelier_user
    region: oregon
    plan: free
    previewsEnabled: true
