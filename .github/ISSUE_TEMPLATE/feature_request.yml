name: Feature Request
description: Propose a new feature or enhancement
title: '[FEATURE]: '
labels:
- enhancement
body:
- type: textarea
  id: problem
  attributes:
    label: Problem Description
    description: A clear description of the problem you're trying to solve or value
      you want to add.
  validations:
    required: true
- type: checkboxes
  id: program
  attributes:
    label: Contributor Program
    options:
    - label: SSoC 2026
    - label: ECSoC 2026
- type: textarea
  id: solution
  attributes:
    label: Proposed Solution
    description: How you envision the feature working (e.g. UI changes, API changes,
      logic flow).
  validations:
    required: true
- type: textarea
  id: alternatives
  attributes:
    label: Alternatives Considered
    description: Any alternative solutions or features you've considered and why they
      were rejected.
  validations:
    required: false
- type: textarea
  id: impact
  attributes:
    label: Impact
    description: Does this affect existing APIs, require database migrations, or have
      performance implications?
  validations:
    required: false
- type: textarea
  id: context
  attributes:
    label: Additional Context
    description: Add any other context, mockup screenshots, or external references.
  validations:
    required: false
