name: Auto‑add ECSoC26 / SSOC Labels to PRs

# Runs whenever a PR is opened, edited or synchronized (e.g., new commits)
# It scans the PR description for the explicit mention of the labels and adds them.
# This complements the existing label‑sync workflow and ensures the program‑specific
# labels are always present when the contributor indicates they are applicable.

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  # Read PR body and write labels on the PR
  pull-requests: write
  issues: write
  contents: read

jobs:
  add-program-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no code needed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect ECSoC26 or SSOC mentions
        id: detect
        uses: actions/github-script@v6
        with:
          script: |
            const body = (context.payload.pull_request.body || '').toLowerCase();
            const labels = [];
            // Look for explicit phrases – you can customise the keywords as needed
            if (body.includes('ecsoc26') || body.includes('ecsoc')) {
              labels.push('ECSoC26');
            }
            if (body.includes('ssoc')) {
              labels.push('SSOC');
            }
            core.setOutput('labels', JSON.stringify(labels));

      - name: Add detected labels to the PR
        if: steps.detect.outputs.labels != '[]'
        uses: actions/github-script@v6
        env:
          LABELS: ${{ steps.detect.outputs.labels }}
        with:
          script: |
            const labels = JSON.parse(process.env.LABELS);
            if (labels.length === 0) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: labels
            });
