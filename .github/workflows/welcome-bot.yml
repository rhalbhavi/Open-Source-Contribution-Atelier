name: Welcome Bot

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

name: Welcome First-Time Contributor

name: Welcome Bot


on:
  issues:
    types: [opened]

  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write


  pull_request:
    types: [opened]


jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:

      - name: Welcome Action
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to **Open-Source-Contribution-Atelier**! 
            
            Thank you so much for opening your first issue. We are excited to have you contribute! 
            
            If you're looking to start working on this, please make sure you check out our [Content Guide](https://github.com/${{ github.repository }}/blob/main/docs/CONTENT_GUIDE.md) and wait until a maintainer assigns the issue to you.
            
            Happy open-sourcing! 🎉
          pr-message: |
            👋 Welcome to **Open-Source-Contribution-Atelier**! 
            
            Thank you so much for your first Pull Request! We're thrilled to have your contribution.
            
            Our automated CI will run checks on your code shortly. Please ensure you've reviewed the **Pre-push checklist** locally (Frontend lint/tests, Backend black/pytest) to help get your PR merged smoothly.
            
            A maintainer will review your code as soon as possible. Happy open-sourcing! 🎉

      - name: Comment on Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `
            ## 👋 Welcome to Open Source Contribution Atelier!

            Thank you for opening this issue! We're glad to have you here. 🎉

            ### 📌 Before You Proceed

            Please review the following guides:

            | Guide | What it covers |
            |-------|----------------|
            | 📋 [How to Get Assigned](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/CONTRIBUTING.md) | Steps to get an issue assigned to you |
            | ⚡ [CI Checks](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/actions) | Automated testing on PRs |
            | ⏰ [3-Day Stale Rule](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/CONTRIBUTING.md#stale-issues) | Submit a PR or update within 3 days |

            ### 📚 Helpful Resources

            - [Contribution Guide](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/CONTRIBUTING.md)
            - [Code of Conduct](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/CODE_OF_CONDUCT.md)
            - [Security Policy](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/SECURITY.md)

            ### 💡 Quick Tip

            Run \`npm run build\` in \`frontend/\` before submitting your PR to catch errors early! 🚀

            Happy open-sourcing! 🎉
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: issueBody
            });

