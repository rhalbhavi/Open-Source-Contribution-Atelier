name: Issue Duplicate Check

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  duplicate:
    runs-on: ubuntu-latest
    steps:
      - name: Search for similar open issues
        uses: actions/github-script@v6
        env:
          NEW_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const newTitle = process.env.NEW_TITLE.toLowerCase();
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title ${newTitle} -${context.payload.issue.number}`;
            const { data: results } = await github.rest.search.issuesAndPullRequests({ q: query });
            const similar = results.items.filter(i => {
              const title = i.title.toLowerCase();
              return title.includes(newTitle) || newTitle.includes(title);
            }).slice(0, 3);
            if (similar.length > 0) {
              let body = `🔎 Possible duplicate issues found (based on title similarity):\n`;
              for (const itm of similar) {
                body += `- #${itm.number} ${itm.title} (🔗 ${itm.html_url})\n`;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: body
              });
            }
