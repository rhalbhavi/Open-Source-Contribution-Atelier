name: Documentation Lint

# Run on any push or PR that touches Markdown files
on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run markdownlint
        uses: actions/markdownlint-cli@v3
        with:
          args: "**/*.md --ignore node_modules --ignore .github/**/*.yml"
