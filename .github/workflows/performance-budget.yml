name: Performance Budget Enforcement

on:
  pull_request:
    branches:
      - main

jobs:
  bundle-size-check:
    name: "Frontend Bundle Size Budget"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend and generate stats
        working-directory: frontend
        run: npm run analyze-bundle

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-performance-report
          path: |
            frontend/dist/stats.html
            frontend/public/performance.json
          retention-days: 7

      - name: Check bundle size budget and comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const perfPath = path.join('frontend', 'public', 'performance.json');
            if (!fs.existsSync(perfPath)) {
              core.setFailed('Performance report not found. Did analyze-bundle run successfully?');
              return;
            }

            const report = JSON.parse(fs.readFileSync(perfPath, 'utf-8'));
            const { metrics, budget, top10Chunks, violations, status } = report;

            const summary = [
              '## 📦 Bundle Size Report',
              '',
              `| Metric | Value | Budget | Status |`,
              `|--------|-------|--------|--------|`,
              `| Total JS (gzip) | ${metrics.totalJsGzipKB}KB | ${budget.totalJsGzipKB}KB | ${metrics.totalJsGzipKB <= budget.totalJsGzipKB ? '✅' : '❌'} |`,
              `| Total CSS (gzip) | ${metrics.totalCssGzipKB}KB | ${budget.totalCssGzipKB}KB | ${metrics.totalCssGzipKB <= budget.totalCssGzipKB ? '✅' : '❌'} |`,
            ];

            if (violations.length > 0) {
              summary.push('', '### Oversized Chunks', ...violations.map(v => `- ${v}`));
            }
            
            summary.push('', 'A detailed breakdown (`stats.html`) is available in the workflow artifacts.');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary.join('\n'),
            });

            if (status === 'failed') {
              core.setFailed('Bundle sizes exceed the configured budget.');
            }

  lighthouse-check:
    name: "Lighthouse Performance Budget"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Serve production build
        working-directory: frontend
        run: npx serve -s dist -p 5173 &
        shell: bash

      - name: Wait for server
        run: sleep 5

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  api-latency-check:
    name: "API Latency Budget (smoke test)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run API latency smoke test
        uses: actions/github-script@v7
        with:
          script: |
            const budget = JSON.parse(require('fs').readFileSync('performance-budget.json', 'utf-8'));
            core.notice(`API latency budgets loaded: ${budget.api.endpoints.length} endpoint(s) configured.`);
            core.notice('Full latency checks run against PR deployment environments. Configure STAGING_URL secret to enable.');
