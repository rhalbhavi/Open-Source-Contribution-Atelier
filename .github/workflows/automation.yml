name: Automation

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, edited]
  schedule:
    - cron: '0 0 * * *' # daily midnight UTC for stale check

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.eventName === 'issues';
            const comment = `👋 Hi @${{ github.actor }}! Thanks for opening this ${isIssue ? 'issue' : 'pull request'}.

We appreciate your contribution. The team will review it shortly. If you have any questions, feel free to ask!`;
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            if (!existing.some(c => c.body === comment)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

  review_soon:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Post review soon comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = '🚀 Thanks for the PR! We’ll review this soon.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

  link_check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'edited')
    steps:
      - name: Ensure PR references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const hasRef = /#\d+/.test(body);
            if (!hasRef) {
              const comment = '🔗 It looks like this PR does not reference the related issue. Please add a line like `Fixes #123` or `Closes #123` to the PR description so the issue is automatically closed when the PR merges.';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

  stale:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Find stale issues and PRs
        uses: actions/github-script@v7
        with:
          script: |
            const daysStaleIssue = 3;
            const daysStalePR = 3;
            const now = new Date();
            // Issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            for (const issue of issues) {
              if (issue.pull_request) continue; // skip PRs
              const updated = new Date(issue.updated_at);
              const diffDays = (now - updated) / (1000 * 60 * 60 * 24);
              if (diffDays >= daysStaleIssue) {
                  // Check for any open PR that references this issue
                  const linked = await github.rest.search.issuesAndPullRequests({
                    q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open linked:${issue.number}`
                  });
                  if (linked.total_count > 0) {
                    // An open PR is linked – skip the stale reminder
                    continue;
                  }
                  const comment = '⏰ This issue has been inactive for a while. If it’s still relevant, please add a comment or update its status. Otherwise, we may close it after a further period.';
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: comment,
                  });
                }
            }
            // Pull Requests
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            for (const pr of prs) {
              const updated = new Date(pr.updated_at);
              const diffDays = (now - updated) / (1000 * 60 * 60 * 24);
              if (diffDays >= daysStalePR) {
                const comment = '⏰ This pull request has been inactive for a while. Please add a comment or update its status if it’s still relevant.';
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: comment,
                });
              }
            }
