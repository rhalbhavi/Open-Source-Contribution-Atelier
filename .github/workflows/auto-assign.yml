name: Auto Assign Issue

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    # Only run on issues, not PRs (PRs also trigger issue_comment events)
    if: ${{ !github.event.issue.pull_request }}
    steps:
      - name: Process Issue Comments
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          script: |
            const commentBody = context.payload.comment.body.toLowerCase();
            const commenter = context.payload.comment.user.login;
            const issue = context.payload.issue;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            // Check if commenter is a maintainer
            let isMaintainer = false;
            try {
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: repoOwner,
                repo: repoName,
                username: commenter
              });
              isMaintainer = ['admin', 'write'].includes(perm.permission);
            } catch(e) {
              // Not a collaborator
            }

            // --- 1. MAINTAINER SLASH COMMANDS ---
            if (isMaintainer) {
              if (commentBody.startsWith('/close')) {
                await github.rest.issues.update({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  state: 'closed'
                });
                return;
              }
              
              const labelMatch = commentBody.match(/^\/label\s+(.+)$/im);
              if (labelMatch) {
                const labels = labelMatch[1].split(',').map(l => l.trim());
                await github.rest.issues.addLabels({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  labels: labels
                });
                return;
              }
              
              const assignMatch = commentBody.match(/^\/assign\s+@([a-zA-Z0-9_-]+)/im);
              if (assignMatch) {
                const targetUser = assignMatch[1];
                await github.rest.issues.addAssignees({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  assignees: [targetUser]
                });
                await github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  body: `Assigned to @${targetUser} by maintainer request.`
                });
                return;
              }
            }

            // --- 2. AUTO-UNASSIGN ---
            if (commentBody.includes('unassign me')) {
              const isAssigned = issue.assignees.some(a => a.login === commenter);
              if (isAssigned) {
                await github.rest.issues.removeAssignees({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  assignees: [commenter]
                });
                await github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  body: `@${commenter} You have been unassigned. This issue is now open for others!`
                });
              }
              return;
            }

            // --- 3. AUTO-ASSIGN & HOARDING PREVENTION ---
            if ((commentBody.includes('assign me') || commentBody.includes('assign to me')) && !commentBody.includes('unassign')) {
              if (issue.assignees && issue.assignees.length > 0) {
                if (!issue.assignees.some(a => a.login === commenter)) {
                  await github.rest.issues.createComment({
                    owner: repoOwner,
                    repo: repoName,
                    issue_number: issue.number,
                    body: `Sorry @${commenter}, this issue is already assigned to someone else.`
                  });
                }
                return;
              }
              
              // Check for hoarding
              const openAssignedIssues = await github.rest.search.issuesAndPullRequests({
                q: `repo:${repoOwner}/${repoName} is:issue is:open assignee:${commenter}`
              });
              
              if (openAssignedIssues.data.total_count >= 1) {
                await github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issue.number,
                  body: `Sorry @${commenter}, you already have an active issue assigned to you. Please finish it before taking on another to give everyone a chance to contribute!`
                });
                return;
              }
              
              // Assign to the user
              await github.rest.issues.addAssignees({
                owner: repoOwner,
                repo: repoName,
                issue_number: issue.number,
                assignees: [commenter]
              });
              
              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: issue.number,
                body: `Assigned to @${commenter}! Thanks for contributing.`
              });
            }
