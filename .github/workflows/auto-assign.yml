name: Auto Assign Issues

on:
  issue_comment:
    types: [created]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check assignment and assign
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            
            // Check if the issue is already assigned
            if (issue.assignees && issue.assignees.length > 0) {
              console.log('Issue is already assigned. Ignoring comment.');
              return;
            }

            // Optional: check for specific keywords if desired
            const body = comment.body.toLowerCase();
            const triggerWords = [
              '/assign', 'assign to me', 'can i work on this', 'i would like to work on this',
              'assign me', 'i am interested', "i'll work on this", 'i will work on this',
              'please assign', 'assign it to me', 'can you assign', 'could you assign',
              'assign this to me', 'can i take this', 'i want to work on this',
              'would like to work', 'please assign me'
            ];
            const shouldAssign = triggerWords.some(word => body.includes(word)) || body.includes('assign');
            
            if (shouldAssign) {
              // Assign the user who commented
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [comment.user.login]
              });

              // Post the welcome message
              const message = `@${comment.user.login}, this issue has been assigned to you! Please submit a PR within 2 days.\n\nWhen you create your PR, make sure to mention this issue number as \`#${issue.number}\` in the PR body so it automatically links to this issue.`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
              
              console.log(`Assigned issue #${issue.number} to @${comment.user.login}`);
            }
