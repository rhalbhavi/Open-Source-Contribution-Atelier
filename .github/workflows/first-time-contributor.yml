name: First Interaction Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Welcome first-time contributors
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.sender.login;
            const isIssue = !!context.payload.issue;
            const number = isIssue ? context.payload.issue.number : context.payload.pull_request.number;
            
            try {
              let interactions = [];
              if (isIssue) {
                // Check if this is their first issue
                const response = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  creator: creator,
                  state: 'all'
                });
                interactions = response.data.filter(issue => !issue.pull_request);
              } else {
                // Check if this is their first PR
                const response = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'all'
                });
                interactions = response.data.filter(pr => pr.user.login === creator);
              }

              // If it's their very first interaction
              if (interactions.length === 1) {
                const message = `🎉 Welcome to the Open Source Contribution Atelier, @${creator}!\n\nThank you for your first ${isIssue ? 'issue' : 'pull request'}! We are excited to have you contribute. Please make sure to check out our [Contributing Guidelines](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/.github/CONTRIBUTING.md) and [Code of Conduct](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/.github/CODE_OF_CONDUCT.md).\n\nIf you have any questions, feel free to ask. Happy contributing!`;
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  body: message
                });
              }
            } catch (error) {
              console.log('Error checking interactions:', error);
            }
