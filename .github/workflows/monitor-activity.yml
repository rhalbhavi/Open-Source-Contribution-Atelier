name: Monitor Activity

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run activity monitor
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const INACTIVITY_DAYS = 5;
            const MS_PER_DAY = 1000 * 60 * 60 * 24;
            const DIFF_LABELS = ['easy', 'medium', 'hard'];
            const SSOC_LABEL  = 'ssoc26';
            const now = Date.now();

            function alreadyUnassigned(comments) {
              return comments.some(c =>
                c.user.type === 'Bot' &&
                c.body.includes('unassigned due to inactivity')
              );
            }

            // ── 1. Open issues ───────────────────────────────────────────
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100
            });

            for (const item of issues) {
              if (item.pull_request) continue;

              const num       = item.number;
              const assignees = item.assignees.map(a => a.login);
              const labels    = item.labels.map(l => l.name);
              const ageDays   = (now - new Date(item.updated_at).getTime()) / MS_PER_DAY;

              // ssoc26
              if (!labels.includes(SSOC_LABEL)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: [SSOC_LABEL] });
              }

              // difficulty
              const hasDiff = labels.some(l => DIFF_LABELS.includes(l.toLowerCase()));
              if (!hasDiff) {
                const text = `${item.title} ${item.body || ''}`.toLowerCase();
                const easyKw = ['typo','spelling','grammar','documentation','readme','docs','broken link','simple','css','color','text','wording','format','markdown'];
                const hardKw = ['refactor','database','performance','security','race condition','memory leak','docker','api design','django','optimization','scale','architecture','celery','redis','postgresql'];
                const diff = easyKw.some(k => text.includes(k)) ? 'easy'
                           : hardKw.some(k => text.includes(k)) ? 'hard'
                           : 'medium';
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: [diff] });
              }

              // auto-assign from "assign me" comments
              if (assignees.length === 0) {
                const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: num });
                const ASSIGN_RE = /\b(assign\s*me|can\s*i\s*(take|work\s*on)\s*(this|it)?|i\s*(want\s*to|will|would\s*like\s*to)\s*(work\s*on|take|fix)|i('?m|\s+am)\s+(working\s*on|interested))\b/i;
                const botUnassignTimes = comments
                  .filter(c => c.user.type === 'Bot' && c.body.includes('unassigned due to inactivity'))
                  .map(c => new Date(c.created_at).getTime());

                for (const c of comments) {
                  if (c.user.type === 'Bot') continue;
                  if (!ASSIGN_RE.test(c.body)) continue;
                  const ct = new Date(c.created_at).getTime();
                  if (botUnassignTimes.some(t => t > ct)) continue;
                  console.log(`Assigning issue #${num} to @${c.user.login}`);
                  await github.rest.issues.addAssignees({ owner, repo, issue_number: num, assignees: [c.user.login] });
                  break;
                }
                continue;
              }

              // 5-day inactivity => unassign
              if (ageDays >= INACTIVITY_DAYS) {
                const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: num });
                if (alreadyUnassigned(comments)) continue;

                const prSearch = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${owner}/${repo} is:pr #${num}`
                });
                if (prSearch.data.total_count > 0) continue;

                const names = assignees.map(a => `@${a}`).join(', ');
                console.log(`Unassigning issue #${num} (${Math.floor(ageDays)}d inactive): ${names}`);
                await github.rest.issues.removeAssignees({ owner, repo, issue_number: num, assignees });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: num,
                  body: `Hey ${names}, this issue has been inactive for ${Math.floor(ageDays)} days with no linked PR, so we're unassigning it to let others pick it up. Feel free to comment again if you'd like to continue!`
                });
              }
            }

            // ── 2. Open PRs: sync labels + assign author ──────────────────
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100
            });

            for (const pr of prs) {
              const num    = pr.number;
              const author = pr.user.login;
              const labels = pr.labels.map(l => l.name);
              const body   = pr.body || '';

              const prAssignees = pr.assignees.map(a => a.login);
              if (!prAssignees.includes(author)) {
                await github.rest.issues.addAssignees({ owner, repo, issue_number: num, assignees: [author] });
              }

              if (!labels.includes(SSOC_LABEL)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: [SSOC_LABEL] });
              }

              const hasDiff = labels.some(l => DIFF_LABELS.includes(l.toLowerCase()));
              if (!hasDiff) {
                const m = body.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*[:#]?\s*#?(\d+)/i);
                if (m) {
                  try {
                    const linked = await github.rest.issues.get({ owner, repo, issue_number: parseInt(m[1]) });
                    const issueDiff = linked.data.labels.map(l => l.name).find(l => DIFF_LABELS.includes(l.toLowerCase()));
                    await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: [issueDiff || 'medium'] });
                  } catch { /* issue not found */ }
                } else {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: ['medium'] });
                }
              }
            }

            console.log('Monitor run complete.');
