name: Monitor Activity

on:
  schedule:
    - cron: '0 * * * *' # Run hourly to catch up on missed assignments and stale items
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Monitor Issues and PRs
        uses: actions/github-script@v6
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          script: |
            const daysToStale = 2;
            const msPerDay = 1000 * 60 * 60 * 24;
            const now = new Date();
            
            console.log(`Checking for open issues and PRs...`);
            
            // Get all open issues and PRs
            const items = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const item of items) {
              const isPR = !!item.pull_request;
              const updatedAt = new Date(item.updated_at);
              const diffMs = now - updatedAt;
              const diffDays = diffMs / msPerDay;
              const assignees = item.assignees.map(a => a.login);

              let comments = [];
              
              // Only fetch comments if we might need them (to save API calls)
              if ((assignees.length === 0 && !isPR) || diffDays > daysToStale) {
                comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: item.number
                });
              }

              // 0. Retroactive PR Setup
              if (isPR) {
                // Assign PR to author if unassigned
                if (assignees.length === 0) {
                  const author = item.user.login;
                  console.log(`Retroactively assigning PR #${item.number} to @${author}`);
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: item.number,
                    assignees: [author]
                  });
                }

                // Extract issue number and copy labels
                const body = item.body || '';
                const issueRegex = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/i;
                const match = body.match(issueRegex);

                if (match && match[1]) {
                  const issueNumber = parseInt(match[1], 10);
                  try {
                    const linkedIssue = await github.rest.issues.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issueNumber
                    });

                    // 1. Assign linked issue to PR author if not assigned
                    const linkedIssueAssignees = linkedIssue.data.assignees.map(a => a.login);
                    if (!linkedIssueAssignees.includes(item.user.login)) {
                      console.log(`Retroactively assigning linked issue #${issueNumber} to PR author @${item.user.login}`);
                      await github.rest.issues.addAssignees({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issueNumber,
                        assignees: [item.user.login]
                      });
                    }
                    
                    // 2. Copy missing labels from issue to PR
                    const labelsToCopy = linkedIssue.data.labels.map(l => l.name);
                    const currentPRLabels = item.labels.map(l => l.name);
                    const missingLabels = labelsToCopy.filter(l => !currentPRLabels.includes(l));

                    if (missingLabels.length > 0) {
                      console.log(`Retroactively copying labels from issue #${issueNumber} to PR #${item.number}: ${missingLabels.join(', ')}`);
                      await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: item.number,
                        labels: missingLabels
                      });
                    }

                    // 3. Enforce SSoC26 label synchronization on both
                    const prLabelsLower = currentPRLabels.map(l => l.toLowerCase());
                    const issueLabelsLower = labelsToCopy.map(l => l.toLowerCase());
                    const hasSSoC = prLabelsLower.includes('ssoc26') || issueLabelsLower.includes('ssoc26') || /\[x\]\s*(?:i\s+am\s+a\s+)?ssoc26/i.test(body);

                    if (hasSSoC) {
                      if (!prLabelsLower.includes('ssoc26')) {
                        await github.rest.issues.addLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: item.number,
                          labels: ['SSoC26']
                        });
                      }
                      if (!issueLabelsLower.includes('ssoc26')) {
                        await github.rest.issues.addLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: issueNumber,
                          labels: ['SSoC26']
                        });
                      }
                    }
                  } catch (error) {
                    console.error(`Error retroactively updating linked issue #${issueNumber}:`, error);
                  }
                }
              }

              // 1. Retroactive assignment for unassigned issues
              if (assignees.length === 0 && !isPR) {
                const assignComments = comments.filter(c => c.body.match(/assign.*me/i) && !c.body.toLowerCase().includes('unassign'));
                
                if (assignComments.length > 0) {
                  // Find the most recent request
                  const latestAssignComment = assignComments[assignComments.length - 1];
                  
                  // Make sure a bot hasn't already unassigned this user/issue AFTER their comment
                  const botUnassignComments = comments.filter(c => 
                    c.user.type === 'Bot' && c.body.includes('automatically unassigning')
                  );
                  
                  let shouldAssign = true;
                  if (botUnassignComments.length > 0) {
                    const latestBotComment = botUnassignComments[botUnassignComments.length - 1];
                    if (new Date(latestBotComment.created_at) > new Date(latestAssignComment.created_at)) {
                      shouldAssign = false; // Bot unassigned after their request, don't re-assign
                    }
                  }

                  if (shouldAssign) {
                    const commenter = latestAssignComment.user.login;
                    console.log(`Retroactively assigning issue #${item.number} to ${commenter}`);
                    
                    await github.rest.issues.addAssignees({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: item.number,
                      assignees: [commenter]
                    });
                    
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: item.number,
                      body: `Assigned to @${commenter} retroactively based on your earlier comment! Thanks for contributing.`
                    });
                    continue; // Done with this item for now
                  }
                }
              }

              // 2. Inactivity rules for Assigned Issues and all PRs
              if (isPR) {
                if (diffDays > 2) {
                  const lastComment = comments.length > 0 ? comments[comments.length - 1] : null;
                  const isLastCommentFromBot = lastComment && lastComment.user.type === 'Bot' && lastComment.body.includes('inactive for 2 days');
                  
                  if (!isLastCommentFromBot) {
                    console.log(`Notifying PR #${item.number} about inactivity...`);
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: item.number,
                      body: `Hello! This pull request has been inactive for 2 days. Just checking in to see if there are any updates or if you need help!`
                    });
                  }
                }
              } else if (assignees.length > 0) {
                // Issue rules - check for inactivity
                if (diffDays >= 2) {
                  // Check if a PR has already been submitted referencing this issue
                  const query = `repo:${context.repo.owner}/${context.repo.repo} is:pr ${item.number}`;
                  const prSearch = await github.rest.search.issuesAndPullRequests({ q: query });
                  const hasPR = prSearch.data.total_count > 0;

                  if (!hasPR) {
                    const lastComment = comments.length > 0 ? comments[comments.length - 1] : null;
                    const isLastCommentReminder = lastComment && lastComment.user.type === 'Bot' && lastComment.body.toLowerCase().includes('just checking in to see if you have any updates');
                    
                    if (!isLastCommentReminder) {
                      console.log(`Reminding assignees on issue #${item.number} about submitting a PR`);
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: item.number,
                        body: `Hello @${assignees.join(', @')}! It has been 2 days since this issue was assigned to you and we couldn't find a linked pull request. Just checking in to see if you have any updates or if you need any help. Please submit a draft PR or link your PR to this issue to let us know you are still working on it. Thanks!`
                      });
                    }
                  }
                }
              }

              // 3. Strict Monitoring for difficulty labels (easy/medium/hard) on all issues
              if (!isPR) {
                const currentLabels = item.labels.map(l => l.name.toLowerCase());
                  const hasDifficultyLabel = currentLabels.some(l => ['easy', 'medium', 'hard'].includes(l));

                  if (!hasDifficultyLabel) {
                    console.log(`Issue #${item.number} is missing difficulty label. Running strict monitoring auto-tagger...`);
                    
                    let label = 'none';
                    const title = item.title;
                    const body = item.body || '';
                    const apiKey = process.env.OPENAI_API_KEY;

                    if (apiKey) {
                      try {
                        const prompt = `You are a senior open source maintainer. An issue has been opened. Based on the title and body, classify its difficulty. Reply with EXACTLY ONE word from this list: easy, medium, hard.\n\nTitle: ${title}\nBody: ${body}`;
                        const response = await fetch('https://api.openai.com/v1/chat/completions', {
                          method: 'POST',
                          headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                          },
                          body: JSON.stringify({
                            model: 'gpt-3.5-turbo',
                            messages: [{ role: 'user', content: prompt }],
                            temperature: 0.0,
                            max_tokens: 10
                          })
                        });

                        if (response.ok) {
                          const data = await response.json();
                          const resText = data.choices[0].message.content.trim().toLowerCase().replace(/[^\w]/g, '');
                          if (['easy', 'medium', 'hard'].includes(resText)) {
                            label = resText;
                          }
                        }
                      } catch (err) {
                        console.error('Error during OpenAI classification in monitor:', err);
                      }
                    }

                    if (label === 'none') {
                      const text = `${title} ${body}`.toLowerCase();
                      const easyKeywords = [
                        'typo', 'spelling', 'grammar', 'documentation', 'readme', 'docs',
                        'broken link', 'simple', 'trivial', 'ui', 'css', 'color', 'style',
                        'text', 'wording', 'format', 'misspelling', 'markdown'
                      ];
                      const hardKeywords = [
                        'refactor', 'database', 'performance', 'security', 'race condition',
                        'memory leak', 'docker', 'kubernetes', 'api design', 'django rest',
                        'optimization', 'scale', 'architecture', 'bottleneck', 'concurrency',
                        'deadlock', 'celery', 'redis', 'postgresql', 'postgres'
                      ];

                      if (easyKeywords.some(kw => text.includes(kw))) {
                        label = 'easy';
                      } else if (hardKeywords.some(kw => text.includes(kw))) {
                        label = 'hard';
                      } else {
                        label = 'medium';
                      }
                    }

                    if (label !== 'none') {
                      console.log(`Strict monitoring: auto-labeling issue #${item.number} as: ${label}`);
                      await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: item.number,
                        labels: [label]
                      });

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: item.number,
                        body: `[Strict Monitoring] This issue was opened by a contributor but did not have a difficulty label. It has been automatically classified as **${label}** for mark/point assignments.`
                      });
                    }
                  }
                }
              }
            }
