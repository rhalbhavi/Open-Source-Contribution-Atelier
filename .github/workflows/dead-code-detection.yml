name: Dead Code Detection

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  detect-dead-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: |
          cd frontend
          npm ci

      - name: Run dead code detection
        run: |
          cd backend
          python scripts/dead_code_detector.py --format md --output dead_code_report.md
          python scripts/dead_code_detector.py --format json --output dead_code_report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-report
          path: |
            backend/dead_code_report.md
            backend/dead_code_report.json

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('backend/dead_code_report.md', 'utf8');
              const summary = report.split('## 📊 Summary')[1]?.split('##')[0] || '';
              
              const comment = `
              ## 🧹 Dead Code Detection Report

              ${summary}

              📎 [Download Full Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              
              > 💡 This report is informational only and does not block the PR.
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post comment:', e);
            }