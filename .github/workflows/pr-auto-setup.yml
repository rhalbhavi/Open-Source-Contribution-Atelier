name: PR Auto Setup

on:
  pull_request_target:
    types: [opened]

jobs:
  auto-setup:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Assign creator and copy labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = context.repo;

            // 1. Assign the PR to the person who opened it
            await github.rest.issues.addAssignees({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: pr.number,
              assignees: [pr.user.login]
            });
            console.log(`Assigned PR #${pr.number} to @${pr.user.login}`);

            // 2. Extract issue numbers from the PR body
            // This regex matches "Fixes #123", "Resolves #123", or just "#123"
            const body = pr.body || '';
            const issueRegex = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)?\s*#(\d+)/ig;
            let match;
            const issueNumbers = new Set();
            
            while ((match = issueRegex.exec(body)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }

            if (issueNumbers.size === 0) {
              console.log('No linked issues found in PR body.');
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: pr.number,
                body: `@${pr.user.login}, kindly mention the issue number (e.g., \`#<issue_number>\`) in the PR body that you are solving so we can link it correctly.`
              });
              return;
            }

            // 3. Fetch labels from the linked issues
            const labelsToAdd = new Set();
            for (const issueNum of issueNumbers) {
              try {
                const issue = await github.rest.issues.get({
                  owner: repo.owner,
                  repo: repo.repo,
                  issue_number: issueNum
                });
                
                // Ensure it's actually an issue, not another PR
                if (!issue.data.pull_request) {
                  for (const label of issue.data.labels) {
                    // Extract label name (handles both string array and object array forms)
                    const labelName = typeof label === 'string' ? label : label.name;
                    labelsToAdd.add(labelName);
                  }
                }
              } catch (error) {
                console.log(`Could not fetch issue #${issueNum} or it does not exist.`);
              }
            }

            // 4. Add the labels to the PR
            if (labelsToAdd.size > 0) {
              const labelsArray = Array.from(labelsToAdd);
              await github.rest.issues.addLabels({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: pr.number,
                labels: labelsArray
              });
              console.log(`Added labels to PR #${pr.number}: ${labelsArray.join(', ')}`);
            } else {
              console.log('No labels found on linked issues to add.');
            }
