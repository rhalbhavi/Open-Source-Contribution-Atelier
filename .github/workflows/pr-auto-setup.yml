name: PR Auto Setup

on:
  pull_request_target:
    types: [opened, edited, synchronize]
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  auto-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Process PR Setup and Validation
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          script: |
            async function processPR(pr) {
              const author = pr.user.login;
              const body = pr.body || '';
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              console.log(`Setting up PR #${pr.number} for @${author}`);

              // 1. Assign PR to the author
              await github.rest.issues.addAssignees({
                owner: owner,
                repo: repo,
                issue_number: pr.number,
                assignees: [author]
              });
              console.log(`Assigned PR to @${author}`);


              // 2. Extract issue number from PR body
              const issueRegex = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/i;
              const match = body.match(issueRegex);

              let issueNumber = null;
              if (match && match[1]) {
                issueNumber = parseInt(match[1], 10);
                console.log(`Found linked issue #${issueNumber}`);
              }

              // 3. Assign and label logic if issue is linked
              let issue = null;
              if (issueNumber) {
                try {
                  // Assign linked issue to the PR author
                  await github.rest.issues.addAssignees({
                    owner: owner,
                    repo: repo,
                    issue_number: issueNumber,
                    assignees: [author]
                  });
                  console.log(`Assigned linked issue #${issueNumber} to @${author}`);

                  // Get linked issue details
                  const issueResponse = await github.rest.issues.get({
                    owner: owner,
                    repo: repo,
                    issue_number: issueNumber
                  });
                  issue = issueResponse.data;

                  // Copy labels from issue to PR
                  const labelsToCopy = issue.labels.map(label => label.name);
                  if (labelsToCopy.length > 0) {
                    await github.rest.issues.addLabels({
                      owner: owner,
                      repo: repo,
                      issue_number: pr.number,
                      labels: labelsToCopy
                    });
                    console.log(`Copied labels from issue #${issueNumber}: ${labelsToCopy.join(', ')}`);
                  }
                } catch (error) {
                  console.error(`Could not fetch or update issue #${issueNumber}:`, error);
                }
              }

              // 4. SSoC26 Checkbox & Label enforcement
              try {
                const prLabels = pr.labels ? pr.labels.map(l => l.name.toLowerCase()) : [];
                const issueLabels = issue ? issue.labels.map(l => l.name.toLowerCase()) : [];
                const hasSSoC = prLabels.includes('ssoc26') || issueLabels.includes('ssoc26') || /\[x\]\s*(?:i\s+am\s+a\s+)?ssoc26/i.test(body);

                if (hasSSoC) {
                  // Label PR
                  if (!prLabels.includes('ssoc26')) {
                    await github.rest.issues.addLabels({
                      owner: owner,
                      repo: repo,
                      issue_number: pr.number,
                      labels: ['SSoC26']
                    });
                  }
                  // Label issue
                  if (issueNumber && !issueLabels.includes('ssoc26')) {
                    await github.rest.issues.addLabels({
                      owner: owner,
                      repo: repo,
                      issue_number: issueNumber,
                      labels: ['SSoC26']
                    });
                  }
                }
              } catch (error) {
                console.error('Error enforcing SSoC26 labels:', error);
              }

              // 5. Strict scope compliance check
              if (issueNumber && issue) {
                try {
                  const { data: files } = await github.rest.pulls.listFiles({
                    owner: owner,
                    repo: repo,
                    pull_number: pr.number
                  });

                  const filePaths = files.map(f => f.filename);
                  const hasBackendChanges = filePaths.some(p => p.startsWith('backend/'));
                  const hasFrontendChanges = filePaths.some(p => p.startsWith('frontend/'));
                  const hasDbChanges = filePaths.some(p => p.includes('models.py') || p.includes('migrations/'));

                  const issueText = `${issue.title} ${issue.body || ''}`.toLowerCase();
                  const prBodyLower = body.toLowerCase();

                  // Check if PR body explicitly overrides/declares partial scope
                  const prDeclaresFrontendOnly = prBodyLower.includes('frontend only') || prBodyLower.includes('only frontend') || prBodyLower.includes('ui only') || prBodyLower.includes('only ui') || prBodyLower.includes('frontend part');
                  const prDeclaresBackendOnly = prBodyLower.includes('backend only') || prBodyLower.includes('only backend') || prBodyLower.includes('backend part');
                  const prDeclaresDbOnly = prBodyLower.includes('db only') || prBodyLower.includes('database only') || prBodyLower.includes('only db') || prBodyLower.includes('only database');

                  let expectsBackend = issueText.includes('backend');
                  let expectsFrontend = issueText.includes('frontend') || issueText.includes('ui');
                  let expectsDb = issueText.includes('db') || issueText.includes('database') || issueText.includes('migration');

                  if (prDeclaresFrontendOnly) {
                    expectsBackend = false;
                    expectsDb = false;
                    console.log('PR explicitly declares Frontend only scope. Waiving backend/database checks.');
                  }
                  if (prDeclaresBackendOnly) {
                    expectsFrontend = false;
                    console.log('PR explicitly declares Backend only scope. Waiving frontend checks.');
                  }
                  if (prDeclaresDbOnly) {
                    expectsFrontend = false;
                    expectsBackend = false;
                    console.log('PR explicitly declares Database only scope. Waiving frontend/backend checks.');
                  }

                  let missingScopes = [];
                  if (expectsBackend && !hasBackendChanges) missingScopes.push('Backend (backend/*)');
                  if (expectsFrontend && !hasFrontendChanges) missingScopes.push('Frontend (frontend/*)');
                  if (expectsDb && !hasDbChanges) missingScopes.push('Database models/migrations');

                  if (missingScopes.length > 0) {
                    core.setFailed(`PR Scope Validation Failed. The files modified do not match the expected scope of linked issue #${issueNumber}. Missing: ${missingScopes.join(', ')}`);
                  } else {
                    console.log('PR scope validation passed successfully.');
                  }
                } catch (error) {
                  console.error('Error verifying PR scope compliance:', error);
                }
              }
            }

            if (context.eventName === 'workflow_dispatch') {
              console.log('Manual trigger detected. Fetching all open PRs...');
              const prs = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              console.log(`Found ${prs.length} open PRs.`);
              for (const pr of prs) {
                await processPR(pr);
              }
            } else if (context.payload.pull_request) {
              await processPR(context.payload.pull_request);
            }
