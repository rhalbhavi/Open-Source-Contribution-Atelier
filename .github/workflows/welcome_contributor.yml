name: Welcome Contributor Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome-issue:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post welcome comment on new issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            if (issue.user.login === owner) {
              console.log('Owner opened issue; skipping welcome comment.');
              return;
            }
            const commentBody = `👋 Hi @${issue.user.login}! Thanks for opening this issue.\n\nWe appreciate your contribution. Please make sure to check our [Contribution Guide](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md) and the [Code of Conduct](https://github.com/${owner}/${repo}/blob/main/CODE_OF_CONDUCT.md). If you have any questions, feel free to ask here!`;
            await github.rest.issues.createComment({owner, repo, issue_number: issue.number, body: commentBody});

  welcome-pull-request:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post welcome comment on new PR
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const isFirstTime = pr.author_association === 'FIRST_TIME_CONTRIBUTOR';
            let commentBody = '';
            
            if (isFirstTime) {
              commentBody = `🎉 **Welcome to the community, @${pr.user.login}!** This is your first pull request to this repository! 🚀 We're thrilled to have you here.\n\nPlease ensure you have followed the [Contribution Guide](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md) and that your code passes all CI checks. We’ll review it soon. Happy hacking!`;
              try {
                // Ensure the first-time-contributor label exists
                const labelName = 'first-time-contributor';
                try {
                  await github.rest.issues.getLabel({owner, repo, name: labelName});
                } catch (e) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: 'bfd4f2',
                    description: 'PR submitted by a first-time contributor'
                  });
                }
                await github.rest.issues.addLabels({owner, repo, issue_number: pr.number, labels: [labelName]});
              } catch (e) {
                console.warn(`Could not add first-time-contributor label: ${e}`);
              }
            } else {
              commentBody = `🎉 Thanks for the pull request, @${pr.user.login}!\n\nPlease ensure you have followed the [Contribution Guide](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md) and that your code passes all CI checks. We’ll review it soon. Happy hacking!`;
            }
            
            await github.rest.issues.createComment({owner, repo, issue_number: pr.number, body: commentBody});
