name: Sync Issue Labels & Assignees to PR

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  # Needed to read issues and write labels/assignees on PRs
  issues: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no code needed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract referenced issue numbers
        id: refs
        uses: actions/github-script@v6
        with:
          script: |
            const prBody = context.payload.pull_request.body || ''
            const title = context.payload.pull_request.title || ''
            const text = `${title}\n${prBody}`
            const issueNums = new Set()
            const regex = /#(\d+)/g
            let match
            const prNumber = context.payload.pull_request.number
            while ((match = regex.exec(text)) !== null) {
              const num = parseInt(match[1], 10)
              if (num !== prNumber) {
                issueNums.add(num)
              }
            }
            core.setOutput('issues', JSON.stringify(Array.from(issueNums)))

      - name: Gather labels and assignees from referenced issues
        id: data
        if: steps.refs.outputs.issues != '[]'
        uses: actions/github-script@v6
        env:
          ISSUES: ${{ steps.refs.outputs.issues }}
        with:
          script: |
            const issueNumbers = JSON.parse(process.env.ISSUES)
            const labels = new Set()
            const assignees = new Set()
            for (const num of issueNumbers) {
              const { data } = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: num })
              for (const label of data.labels) {
                labels.add(label.name)
              }
              for (const assignee of data.assignees) {
                assignees.add(assignee.login)
              }
            }
            core.setOutput('labels', JSON.stringify(Array.from(labels)))
            core.setOutput('assignees', JSON.stringify(Array.from(assignees)))

      - name: Apply labels to PR
        if: steps.data.outputs.labels != '[]'
        uses: actions/github-script@v6
        env:
          LABELS: ${{ steps.data.outputs.labels }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const labels = JSON.parse(process.env.LABELS)
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: labels
            })

      - name: Assign PR to same assignees as issue
        if: steps.data.outputs.assignees != '[]'
        uses: actions/github-script@v6
        env:
          ASSIGNEES: ${{ steps.data.outputs.assignees }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const assignees = JSON.parse(process.env.ASSIGNEES)
            if (assignees.length > 0) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: assignees
              })
            }
