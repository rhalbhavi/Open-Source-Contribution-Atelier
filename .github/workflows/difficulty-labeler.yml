name: Difficulty Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label-difficulty:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label difficulty
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.issue.title;
            const body  = context.payload.issue.body || '';
            const num   = context.issue.number;
            const { owner, repo } = context.repo;

            // Skip if already has a difficulty label
            const existing = context.payload.issue.labels.map(l => l.name.toLowerCase());
            if (existing.some(l => ['easy','medium','hard'].includes(l))) {
              console.log('Difficulty label already present, skipping.');
              return;
            }

            // Keyword heuristic classifier
            const text = `${title} ${body}`.toLowerCase();

            const easyKw = [
              'typo','spelling','grammar','documentation','readme','docs',
              'broken link','simple','trivial','ui','css','color','style',
              'text','wording','format','misspelling','markdown','tooltip',
              'button','icon','logo','translation','copy','minor','small fix'
            ];
            const hardKw = [
              'refactor','database','performance','security','race condition',
              'memory leak','docker','kubernetes','api design','django rest',
              'optimization','scale','architecture','bottleneck','concurrency',
              'deadlock','celery','redis','postgresql','postgres','websocket',
              'authentication','oauth','encryption','caching','indexing',
              'migration','schema','pipeline','worker','queue'
            ];

            const label = easyKw.some(k => text.includes(k)) ? 'easy'
                        : hardKw.some(k => text.includes(k)) ? 'hard'
                        : 'medium';

            console.log(`Labeling issue #${num} as: ${label}`);
            await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: [label] });
