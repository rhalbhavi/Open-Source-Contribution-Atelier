name: Publish Tagged Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish GitHub Release

    runs-on: ubuntu-latest

    steps:
      - name: Publish matching draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Publishing release for tag: ${TAG_NAME}"

          IS_DRAFT="$(
            gh api \
              "repos/${REPOSITORY}/releases/tags/${TAG_NAME}" \
              --jq '.draft' \
              2>/dev/null || echo "not-found"
          )"

          if [ "${IS_DRAFT}" = "true" ]; then
            echo "Matching draft release found. Publishing it."

            gh release edit "${TAG_NAME}" \
              --repo "${REPOSITORY}" \
              --draft=false \
              --latest
          elif [ "${IS_DRAFT}" = "false" ]; then
            echo "Release ${TAG_NAME} is already published."
          else
            echo "No draft release found for ${TAG_NAME}."
            echo "Creating a GitHub Release from the tag."

            gh release create "${TAG_NAME}" \
              --repo "${REPOSITORY}" \
              --title "${TAG_NAME}" \
              --generate-notes \
              --latest
          fi