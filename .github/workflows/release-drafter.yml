name: Release Drafter

on:
  push:
    branches:
      - main

  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:
  update-release-draft:
    name: Update Release Draft

    permissions:
      contents: write
      pull-requests: read

    runs-on: ubuntu-latest

    steps:
      - name: Update draft release
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}