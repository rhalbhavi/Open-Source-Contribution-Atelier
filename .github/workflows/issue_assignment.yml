name: Issue Assignment Automation

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign-author:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Assign issue to author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-assignee "${{ github.event.issue.user.login }}"

  assign-first-commenter:
    if: github.event_name == 'issue_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest

    steps:
      - name: Check if issue already has assignees
        id: check
        run: |
          ASSIGNEES=$(jq '.issue.assignees | length' "$GITHUB_EVENT_PATH")

          if [ "$ASSIGNEES" -eq 0 ]; then
            echo "no_assignee=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_assignee=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assign first commenter
        if: steps.check.outputs.no_assignee == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-assignee "${{ github.event.comment.user.login }}"