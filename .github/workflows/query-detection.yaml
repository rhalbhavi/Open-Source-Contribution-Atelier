name: Query Detection

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  detect-unbounded-queries:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Run unbounded query tests
        env:
          DATABASE_URL: postgres://test:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py test tests.test_unbounded_queries --verbosity=2

      - name: Run query count tests
        env:
          DATABASE_URL: postgres://test:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py test tests.test_query_count --verbosity=2

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: query-test-results
          path: backend/test-reports/