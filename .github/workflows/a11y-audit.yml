name: Accessibility Audit (axe-core)

on:
  pull_request:
    branches:
      - main

jobs:
  a11y-lint:
    name: "Static A11y Lint (eslint-plugin-jsx-a11y)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint with jsx-a11y rules
        working-directory: frontend
        run: npm run lint

  a11y-playwright:
    name: "Dynamic A11y Audit (Playwright + axe-core)"
    runs-on: ubuntu-latest
    needs: a11y-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run axe-core accessibility audit
        working-directory: frontend
        run: npx playwright test e2e/a11y.spec.ts --reporter=json > a11y-report.json 2>&1 || true

      - name: Parse and upload a11y report
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: frontend/a11y-report.json

      - name: Post A11y summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## ♿ Accessibility Audit Report\n\n';

            try {
              const report = JSON.parse(fs.readFileSync('frontend/a11y-report.json', 'utf-8'));
              const violations = report?.suites?.flatMap(s => s.specs?.flatMap(sp => sp.tests?.flatMap(t => t.results?.flatMap(r => r.attachments?.filter(a => a.name === 'violations') || []) || []) || []) || []) || [];

              if (violations.length === 0) {
                summary += '✅ No accessibility violations found!\n';
              } else {
                summary += `❌ Found **${violations.length}** accessibility violation group(s).\n\n`;
                summary += '> Run locally with `npx playwright test e2e/a11y.spec.ts` for the full report.\n';
              }
            } catch (e) {
              summary += '⚠️ Could not parse accessibility report. Check the workflow artifacts.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });
