name: Issue Welcome

on:
  issues:
    types: [opened]

jobs:
  welcome-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `
            ## 👋 Welcome, @${context.payload.issue.user.login}!

            Thanks for opening this issue on **Open Source Contribution Atelier**! We're glad to have you here. 🎉

            ### 📌 Before you proceed, please read our pinned guides:

            | Guide | What it covers |
            |-------|----------------|
            | **📋 How to Get Assigned** | You must comment with the keyword \`ssoc26\` or \`ecsoc26\` to be assigned |
            | **⚡ CI Checks on PRs** | Your PR will be auto-tested against Vercel & Hugging Face builds |
            | **⏰ 3-Day Stale Rule** | Submit a PR or update within 3 days or lose the assignment |

            ### 📚 Helpful Resources

            - [Contribution Guide](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/CONTRIBUTING.md)
            - [Code of Conduct](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/CODE_OF_CONDUCT.md)
            - [Security Policy](https://github.com/nandinigoyaldev/Open-Source-Contribution-Atelier/blob/main/SECURITY.md)

            ### 💡 Pro Tip

            Run \`npm run build\` in \`frontend/\` before submitting your PR to catch errors early! 🚀

            Happy open-sourcing! 🎉
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: issueBody
            });