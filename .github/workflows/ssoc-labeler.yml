name: SSoC26 Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label-ssoc:
    runs-on: ubuntu-latest
    steps:
      - name: Add ssoc26 label
        uses: actions/github-script@v6
        with:
          script: |
            const body    = context.payload.issue.body || '';
            const num     = context.issue.number;
            const { owner, repo } = context.repo;
            const existing = context.payload.issue.labels.map(l => l.name.toLowerCase());

            // Always add ssoc26 (this is an SSoC project)
            if (!existing.includes('ssoc26')) {
              console.log(`Adding ssoc26 to issue #${num}`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: ['ssoc26'] });
            }
