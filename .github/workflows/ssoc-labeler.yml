name: Auto-Label SSOC

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label-ssoc:
    runs-on: ubuntu-latest
    steps:
      - name: Check and Label SSoC26
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.issue.body || '';
            const isChecked = /\[x\]\s*(?:i\s+am\s+a\s+)?ssoc26/i.test(body);
            
            if (isChecked) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['SSoC26']
              });
              console.log('Added SSoC26 label to issue');
            }
