name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR based on lines of code changed
        uses: actions/github-script@v6
        with:
          script: |
            // Fetch the PR details to get the latest additions/deletions
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            
            const totalChanges = pr.additions + pr.deletions;
            
            let label = 'size/XS';
            if (totalChanges > 2000) label = 'size/XXL';
            else if (totalChanges > 800) label = 'size/XL';
            else if (totalChanges > 200) label = 'size/L';
            else if (totalChanges > 50) label = 'size/M';
            else if (totalChanges > 20) label = 'size/S';
            
            // Get current labels
            const currentLabels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            
            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL', 'size/XXL'];
            const labelsToRemove = currentLabels.data
              .map(l => l.name)
              .filter(name => sizeLabels.includes(name) && name !== label);
              
            // Remove old size labels if the PR size changed
            for (const labelToRemove of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: labelToRemove
                });
                console.log(`Removed old label: ${labelToRemove}`);
              } catch (e) {
                console.log(`Failed to remove label: ${labelToRemove}`);
              }
            }
            
            // Add new size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [label]
            });
            
            console.log(`Added label ${label} for ${totalChanges} changes (${pr.additions} additions, ${pr.deletions} deletions)`);
